<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario 3</title>
    <link rel="stylesheet" href='../normalize.css'>
    <style rel="stylesheet">
        *,*:before, *:after{
            -webkit-box-sizing: border-box;
                -moz-box-sizing: border-box;
                    box-sizing: border-box;
        }

        .menu-select{
            float: 18px/1.4 arial, sans-serif;
            color:#333;
            background:#ccc;

        }

        #tudo{
            width:100%;
            max-width: 1200px;
            min-width: 860px;
            margin: 0 auto;
            background:#fff;
        }

        body{
            font: 18px/1.4 arial,sans-serif;
            color:#333;
            background:#ccc;

        }

        h1,h2,h3,h4,h5,h6{
            color: #036
        }

        main h1{ 
            margin-top: -25px;

        }

        .topo_header{
                background:#036;
                padding: 5px 20px;
            }
        
        .topo_header h1{
            font: size 36px;
            margin: 4px 0 2px 0;
        }

        .topo_header a{
           color: #fff;
        text-decoration: none;
        }

        .topo_header h2{
            font: size 20px;
            margin: 2px 0 4px 0;
            color: #fff;
        }

        .principal{
            width: 100%;
            padding: 20px 15px;

        }    

        .rodape{
            background: #036;
            color: #fff;
            padding: 5px 0;
            text-align: center;
        }


        pre{font: size 14px;}

        @media(max-width:1040px){
            pre{font-size: 12px;}
        }

        /* campos de formularios*/

        button, select, .bck{
        display: block;
        margin-bottom: 25px;    
        }

        label[for="msg"]{
            display:block; 
        }
    </style>
</head>
<body class="topo">
    <div id="tudo">
        <div class="topo">
            <header class="topo_header">
                <hgroup>
                    <h1><a href="/">Formulario 2</a></h1>
                    <h2>Elementos e Atributos</h2>
                </hgroup>
            </header>
        </div> <!--.topo-->

        <div class="principal">
            <main>
                <section>
                    <h1>Elemento input</h1>
                    <form action="" method="">
                        <p>
                            <Label>Nome:
                                <input type="text" name="nome" required>
                            </Label>
                        </p>
                    
                        <p>
                            <Label>Hidden:
                                <input type="hidden" name="ip">
                            </Label>
                        </p>

                        <p>
                            <Label>Busca:
                                <input type="search" name="q">
                            </Label>
                        </p>

                        <p>
                            <Label>Telefone:
                                <input type="tel" name="tel" required>
                            </Label>
                        </p>
    
                        <p>
                            <Label>URL:
                                <input type="url" name="url" required>
                            </Label>
                        </p>

                        <p>
                            <Label>Email:
                                <input type="email" name="email" required>
                            </Label>
                        </p>

                        <p>
                            <Label>Senha:
                                <input type="password" name="senha" required>
                            </Label>
                        </p>

                        <p>
                            <Label>Data:
                                <input type="date" name="data" required>
                            </Label>
                        </p>

                        <p>
                            <Label>Hora:
                                <input type="time" name="hora" required>
                            </Label>
                        </p>  

                        <p>
                            <Label>Numero:
                                <input type="number" name="numero" required>
                            </Label>

                        </p>

                        <p>
                            <Label>Intervalo:
                                <input type="range" name="intervalo" required>
                            </Label>
                        </p>

                        <p>
                            <Label>Cor:
                                <input type="color" name="cor" required>
                            </Label>
                        </p>

                        <p>
                            <Label>
                                <input type="checkbox" name="abc">Vermelho
                            </Label>
                        </p>

                        <p>
                            <Label>
                                <input type="radio" name="cde">Sim
                            </Label>
                        </p>

                        <p>
                            <Label>Arquivo:
                                <input type="file" name="arquivo" required>
                            </Label>
                        </p>         

                        <p>
                            <input type="submit" value="ENVIAR">
                        </p>

                        <p>
                            <input type="image" src="botao.png.png" width="80" height="80" value="Botão">
                        </p>    

                        <p>
                            <input type="button" value="Ok">
                        </p>                                              
                    </form>

                </section>
            </main>
        <div class="rodape">
            <footer>
                <small>Pagina desenvolvida por Isabelle Andrade</small>
            </footer>
        </div>
</body>
    
        </div>
</body>
    
</body>
    
</body>
</html>
